databaseChangeLog:
  - changeSet:
      id: 002-add-keycloak-user-id
      author: Codex
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: keycloak_id
                  type: VARCHAR(255)
        - addUniqueConstraint:
            tableName: users
            columnNames: email
            constraintName: uq_users_email
        - addUniqueConstraint:
            tableName: users
            columnNames: keycloak_id
            constraintName: uq_users_keycloak_id
