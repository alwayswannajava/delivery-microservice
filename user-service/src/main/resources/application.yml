server:
  port: 8081

spring:
  liquibase:
    default-schema: public

  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5433/users?useSSL=false&serverTimezone=UTC
    username: ${POSTGRESQLDB_USERNAME}
    password: ${POSTGRESQLDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false